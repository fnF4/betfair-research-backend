# fly.toml — Fly.io configuration for the Betfair research backend.
# Pinned to Milan region (mxp) so the outbound IP is Italian, which is
# required for a betfair.it account to accept API logins.

app = "betfair-research-backend"
primary_region = "mxp"

[build]
  # Dockerfile lives in the repo root (see ./Dockerfile).

[env]
  PORT = "8080"
  BETFAIR_DATA_DIR = "/data"

[[services]]
  internal_port = 8080
  protocol = "tcp"
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "requests"
    hard_limit = 25
    soft_limit = 20

  [[services.http_checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "30s"
    method = "get"
    path = "/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

[[mounts]]
  source = "betfair_data"
  destination = "/data"
